# App
spring.application.name=taskflow-api


# Database
spring.datasource.url=jdbc:mysql://localhost:3306/taskflow_prod
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=taskflow-super-secret-key-must-be-at-least-32-characters
jwt.expiration=36000000

server.port=${PORT:8080}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.info.title=TaskFlow API
springdoc.info.description=Task Management REST API with JWT Authentication and Role-based Access Control
springdoc.info.version=1.0.0

